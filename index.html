<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมคำนวณระยะเวลาคนเดินข้ามถนน (ปรับปรุง)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
        }
        .form-input, .form-select, .form-radio {
            border-color: #D1D5DB;
        }
        .form-input:focus, .form-select:focus, .form-radio:focus {
            --tw-ring-color: #3b82f6;
            border-color: #3b82f6;
        }
        .btn-primary {
            background-color: #2563EB;
            color: white;
            transition: background-color 0.3s;
        }
        .btn-primary:hover {
            background-color: #1D4ED8;
        }
        .btn-secondary {
            background-color: #6B7280;
            color: white;
            transition: background-color: 0.3s;
        }
        .btn-secondary:hover {
            background-color: #4B5563;
        }
        #road-visual {
            background-color: #4B5563;
            transition: all 0.5s ease-in-out;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column; 
        }
        .lane-marking-dashed {
            border-bottom: 5px dashed white;
        }
        .center-divider-solid {
            background-color: #F97316;
            min-height: 5px;
            width: 100%;
        }
        .median-island-visual {
            background-color: #16A34A;
            background-image: repeating-linear-gradient(45deg, #15803D, #15803D 10px, #16A34A 10px, #16A34A 20px);
            width: 100%;
            border-top: 2px solid #a3a3a3;
            border-bottom: 2px solid #a3a3a3;
            flex-shrink: 0;
            flex-basis: 25%;
        }
        .traffic-flow {
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }
        #crosswalk-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 20%;
            height: 100%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .crosswalk-stripe {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.9);
        }
        .stop-line-visual {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
        }
        #stop-line-left {
            left: calc(50% - 10% - 8px);
        }
        #stop-line-right {
            right: calc(50% - 10% - 8px);
        }
        .clipped-by-crosswalk {
            --mask-start: calc(50% - 10% - 5px);
            --mask-end:   calc(50% + 10% + 5px);
            -webkit-mask-image: linear-gradient(to right, black 0, black var(--mask-start), transparent var(--mask-start), transparent var(--mask-end), black var(--mask-end), black 100%);
            mask-image: linear-gradient(to right, black 0, black var(--mask-start), transparent var(--mask-start), transparent var(--mask-end), black var(--mask-end), black 100%);
        }
        details > summary {
            list-style: none;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }
        details[open] summary .arrow-down {
            transform: rotate(180deg);
        }
        .collapsible {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.4s ease-out;
        }
        .collapsible.open {
            grid-template-rows: 1fr;
        }
        .collapsible-content {
            overflow: hidden;
        }
        .unit-btn, .lang-btn {
            transition: background-color 0.2s, color 0.2s;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-6xl bg-white p-6 sm:p-8 rounded-2xl shadow-lg relative">
        
        <!-- Language Toggle -->
        <div class="absolute top-4 right-4 sm:top-6 sm:right-8 z-10">
            <div class="inline-flex rounded-md shadow-sm" role="group">
                <button type="button" id="lang-btn-th" onclick="setLanguage('th')" class="lang-btn rounded-l-lg px-3 py-1.5 text-xs sm:text-sm font-medium border border-blue-600 bg-blue-600 text-white">TH</button>
                <button type="button" id="lang-btn-en" onclick="setLanguage('en')" class="lang-btn -ml-px rounded-r-lg px-3 py-1.5 text-xs sm:text-sm font-medium border border-gray-200 bg-white text-gray-700 hover:bg-gray-50">EN</button>
            </div>
        </div>

        <h1 class="text-2xl sm:text-3xl font-bold text-center text-gray-900 mb-6 pr-16 sm:pr-0" data-i18n="mainTitle">เครื่องคำนวณระยะเวลาคนเดินข้ามถนน</h1>

        <!-- Visual Aid -->
        <div class="mb-6">
            <h3 class="font-bold text-lg mb-2 text-gray-700" data-i18n="visualTitle">ภาพประกอบถนน (ขับชิดซ้าย)</h3>
            <div id="road-visual-container" class="w-full h-32 bg-gray-200 rounded-lg flex items-center justify-center p-2">
                <div id="road-visual" class="h-full rounded-md shadow-inner" style="width: 80%;">
                    <!-- Visuals generated by JS -->
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-x-12 gap-y-8">
            <!-- Input Section -->
            <form id="crossing-form" class="lg:col-span-3 space-y-6">
                <h2 class="text-xl font-bold text-gray-800 border-b pb-2" data-i18n="section1Title">1. กรอกข้อมูล</h2>
                
                <!-- Unit Toggle -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="unitLabel">หน่วยวัด:</label>
                    <div class="inline-flex rounded-md shadow-sm" role="group">
                        <button type="button" id="unit-btn-meters" data-unit="meters" class="unit-btn rounded-l-lg px-4 py-2 text-sm font-medium border border-blue-600 bg-blue-600 text-white" data-i18n="unitMeters">เมตร</button>
                        <button type="button" id="unit-btn-feet" data-unit="feet" class="unit-btn -ml-px rounded-r-lg px-4 py-2 text-sm font-medium border border-gray-200 bg-white text-gray-700" data-i18n="unitFeet">ฟุต</button>
                    </div>
                </div>

                <!-- Road Info Section -->
                <div class="space-y-4 p-4 border rounded-lg bg-gray-50">
                    <h3 class="font-semibold text-lg text-gray-800" data-i18n="roadInfoTitle">ข้อมูลถนน</h3>
                    <!-- Stage 1 & 2 Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Stage 1 -->
                        <div class="p-3 border rounded-md bg-white space-y-2">
                            <h4 class="font-semibold text-gray-700" data-i18n="stage1Title">ฝั่งที่ 1 (ฝั่งแรกที่ข้าม)</h4>
                            <div class="flex gap-4">
                                <label class="flex items-center text-xs"><input type="radio" name="stage1-input-type" value="lanes" class="form-radio" checked> <span class="ml-1" data-i18n="byLanes">ตามจำนวนช่อง</span></label>
                                <label class="flex items-center text-xs"><input type="radio" name="stage1-input-type" value="direct" class="form-radio"> <span class="ml-1" data-i18n="byWidth">ระบุความกว้าง</span></label>
                            </div>
                            <div class="collapsible" id="stage1-lanes-wrapper">
                                <div class="collapsible-content space-y-3 pt-2">
                                    <div>
                                        <label for="stage1-num-lanes" class="text-sm font-medium text-gray-600" data-i18n="numLanes">จำนวนช่อง</label>
                                        <input type="number" id="stage1-num-lanes" value="2" min="1" step="1" class="form-input mt-1 block w-full rounded-md shadow-sm p-2 text-sm">
                                    </div>
                                    <div>
                                        <label for="stage1-lane-width" class="text-sm font-medium text-gray-600"><span data-i18n="laneWidth">ความกว้างต่อช่อง</span> (<span class="unit-label" data-i18n="unitMeters">เมตร</span>)</label>
                                        <input type="number" id="stage1-lane-width" value="3.5" min="1" step="0.1" class="form-input mt-1 block w-full rounded-md shadow-sm p-2 text-sm">
                                    </div>
                                </div>
                            </div>
                            <div class="collapsible" id="stage1-direct-wrapper">
                                <div class="collapsible-content space-y-3 pt-2">
                                    <div>
                                         <label for="stage1-vis-lanes" class="text-sm font-medium text-gray-600" data-i18n="visualLanes">จำนวนช่อง (สำหรับภาพ)</label>
                                         <input type="number" id="stage1-vis-lanes" value="2" min="1" step="1" class="form-input mt-1 block w-full rounded-md shadow-sm p-2 text-sm">
                                    </div>
                                    <div>
                                         <label for="stage1-width" class="text-sm font-medium text-gray-600"><span data-i18n="totalWidth">ความกว้างรวม</span> (<span class="unit-label" data-i18n="unitMeters">เมตร</span>)</label>
                                         <input type="number" id="stage1-width" data-i18n-placeholder="enterWidth" placeholder="ระบุความกว้างรวม" class="form-input mt-1 block w-full rounded-md shadow-sm p-2 text-sm">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Stage 2 -->
                        <div class="p-3 border rounded-md bg-white space-y-2">
                            <h4 class="font-semibold text-gray-700" data-i18n="stage2Title">ฝั่งที่ 2 (ฝั่งที่สอง)</h4>
                             <div class="flex gap-4">
                                <label class="flex items-center text-xs"><input type="radio" name="stage2-input-type" value="lanes" class="form-radio" checked> <span class="ml-1" data-i18n="byLanes">ตามจำนวนช่อง</span></label>
                                <label class="flex items-center text-xs"><input type="radio" name="stage2-input-type" value="direct" class="form-radio"> <span class="ml-1" data-i18n="byWidth">ระบุความกว้าง</span></label>
                            </div>
                            <div class="collapsible" id="stage2-lanes-wrapper">
                                <div class="collapsible-content space-y-3 pt-2">
                                    <div>
                                        <label for="stage2-num-lanes" class="text-sm font-medium text-gray-600" data-i18n="numLanes">จำนวนช่อง</label>
                                        <input type="number" id="stage2-num-lanes" value="2" min="1" step="1" class="form-input mt-1 block w-full rounded-md shadow-sm p-2 text-sm">
                                    </div>
                                    <div>
                                        <label for="stage2-lane-width" class="text-sm font-medium text-gray-600"><span data-i18n="laneWidth">ความกว้างต่อช่อง</span> (<span class="unit-label" data-i18n="unitMeters">เมตร</span>)</label>
                                        <input type="number" id="stage2-lane-width" value="3.5" min="1" step="0.1" class="form-input mt-1 block w-full rounded-md shadow-sm p-2 text-sm">
                                    </div>
                                </div>
                            </div>
                            <div class="collapsible" id="stage2-direct-wrapper">
                                 <div class="collapsible-content space-y-3 pt-2">
                                     <div>
                                         <label for="stage2-vis-lanes" class="text-sm font-medium text-gray-600" data-i18n="visualLanes">จำนวนช่อง (สำหรับภาพ)</label>
                                         <input type="number" id="stage2-vis-lanes" value="2" min="1" step="1" class="form-input mt-1 block w-full rounded-md shadow-sm p-2 text-sm">
                                     </div>
                                     <div>
                                          <label for="stage2-width" class="text-sm font-medium text-gray-600"><span data-i18n="totalWidth">ความกว้างรวม</span> (<span class="unit-label" data-i18n="unitMeters">เมตร</span>)</label>
                                          <input type="number" id="stage2-width" data-i18n-placeholder="enterWidth" placeholder="ระบุความกว้างรวม" class="form-input mt-1 block w-full rounded-md shadow-sm p-2 text-sm">
                                     </div>
                                 </div>
                            </div>
                        </div>
                    </div>
                     <!-- Median Toggle -->
                    <div class="relative flex items-start pt-2">
                        <div class="flex items-center h-5">
                            <input id="median-toggle" type="checkbox" class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                        </div>
                        <div class="ml-3 text-sm">
                            <label for="median-toggle" class="font-medium text-gray-700" data-i18n="hasMedian">มีเกาะกลางถนนที่ปลอดภัย</label>
                        </div>
                    </div>
                </div>

                <!-- Pedestrian Type -->
                <div class="space-y-4 p-4 border rounded-lg bg-gray-50">
                    <h3 class="font-semibold text-lg text-gray-800" data-i18n="pedTypeTitle">ประเภทผู้ข้ามถนน</h3>
                    <div class="mt-2 space-y-2">
                         <label class="flex items-center"><input name="ped-type" type="radio" value="inclusive" class="form-radio" checked> <span id="ped-inclusive-label" class="ml-2"></span></label>
                         <label class="flex items-center"><input name="ped-type" type="radio" value="general" class="form-radio"> <span id="ped-general-label" class="ml-2"></span></label>
                         <label class="flex items-center"><input name="ped-type" type="radio" value="special" class="form-radio"> <span id="ped-special-label" class="ml-2"></span></label>
                         <label class="flex items-center"><input name="ped-type" type="radio" value="custom" class="form-radio"> <span class="ml-2" data-i18n="customType">ระบุเอง</span></label>
                    </div>
                    <div id="custom-speed-div" class="collapsible">
                        <div class="collapsible-content pt-2 flex items-center">
                            <input type="number" id="custom-speed" min="0.1" step="0.1" data-i18n-placeholder="enterSpeed" placeholder="ระบุความเร็ว" class="form-input mt-1 block w-full rounded-md shadow-sm p-2 text-sm">
                            <span id="custom-speed-unit" class="text-sm text-gray-500 ml-2">m/s</span>
                        </div>
                    </div>
                </div>

                <!-- Initial Walk Interval -->
                <div>
                    <label for="walk-interval" class="block text-sm font-medium text-gray-700 mb-2" data-i18n="walkIntervalTitle">เวลาเริ่มต้น (Walk Interval)</label>
                    <input type="number" id="walk-interval" value="7" min="4" max="7" step="1" class="form-input block w-full rounded-md shadow-sm p-2" required>
                </div>
                
                <div class="pt-4">
                    <button type="reset" id="reset-btn" class="w-full btn-secondary font-bold py-2 px-4 rounded-lg shadow-md" data-i18n="resetBtn">ล้างค่าทั้งหมด</button>
                </div>
            </form>

            <!-- Right Column: Results & Recommendations -->
            <div class="lg:col-span-2 space-y-8">
                <!-- Result Section -->
                <div>
                    <h2 class="text-xl font-bold text-gray-800 border-b pb-2 mb-4" data-i18n="section2Title">2. ผลลัพธ์การคำนวณ</h2>
                    <div id="result-container" class="bg-blue-50 p-6 rounded-lg space-y-4 text-center">
                        <!-- Results will be injected here -->
                    </div>
                </div>
                 
                 <!-- Recommendations -->
                <div>
                     <h2 class="text-xl font-bold text-gray-800 border-b pb-2 mb-4" data-i18n="section3Title">3. คำแนะนำและข้อควรพิจารณา</h2>
                     <ul class="list-disc list-inside space-y-3 text-sm text-gray-700" id="recommendations-list">
                         <!-- Injected via JS for translation -->
                     </ul>
                </div>
            </div>
        </div>

        <!-- Calculation Explanation Section -->
        <div class="mt-10 pt-6 border-t col-span-1 lg:col-span-5">
            <details>
                <summary class="text-xl font-bold text-gray-800 cursor-pointer hover:text-blue-700 flex justify-between items-center">
                    <span data-i18n="theoryTitle">หลักการและวิธีการคำนวณ</span>
                    <svg class="w-6 h-6 arrow-down transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </summary>
                <div class="mt-4 space-y-4 text-gray-700" id="theory-content">
                    <!-- Injected via JS for translation -->
                </div>
            </details>
        </div>
    </div>

        // --- Translations Dictionary ---
        const translations = {

                mainTitle: "เครื่องคำนวณระยะเวลาคนเดินข้ามถนน",

                rec4: "การออกแบบเพื่อทุกคน (Inclusive Design) เป็นหัวใจสำคัญ ควรพิจารณาความเร็วในการเดินที่ต่ำ (เช่น 0.9 m/s) เพื่อให้ครอบคลุมผู้ใช้งานทุกกลุ่ม",
                rec5: "การออกแบบทางกายภาพ เช่น ทางลาดสำหรับรถเข็น และการติดตั้งพื้นผิวต่างสัมผัส (Tactile Paving) เป็นสิ่งสำคัญอย่างยิ่ง",
                rec6: "<strong>แนวทางจากมาตรฐานสากล:</strong><ul class='list-circle list-inside ml-4 mt-1'><li><strong>MUTCD (สหรัฐฯ):</strong> ใช้ 1.2 m/s เป็นค่าเริ่มต้น</li><li><strong>FHWA (สหรัฐฯ):</strong> แนะนำให้ลดลงเหลือ 1.0 m/s ในพื้นที่ที่มีผู้สูงอายุหนาแน่น</li><li><strong>UK DfT (สหราชอาณาจักร):</strong> ใช้ 1.0 m/s หรือ 0.8 m/s ในใจกลางเมือง</li><li><strong>Austroads (ออสเตรเลีย):</strong> ใช้ 1.0 m/s ทั่วไป และ 0.8 m/s ในใจกลางเมือง</li></ul>",
                // Theory HTML
                theoryHTML: `
                    <p>เอกสารนี้จัดทำขึ้นเพื่ออธิบายหลักการและที่มาของสูตรที่ใช้ในโปรแกรม เพื่อสร้างความเข้าใจพื้นฐานด้านวิศวกรรมจราจรที่เกี่ยวข้องกับการออกแบบสัญญาณไฟสำหรับคนเดินข้าม</p>
                    <h3 class="text-lg font-semibold pt-2 text-gray-800">ภาพรวมของการคำนวณ</h3>
                    <p>ระยะเวลาทั้งหมดที่คนเดินข้ามถนนต้องการ (Total Crossing Time) ประกอบด้วย 2 ส่วนหลัก คือ <strong>"ช่วงเวลาเดิน (Walk Interval)"</strong> และ <strong>"ช่วงเวลาว่างของผู้ข้าม (Pedestrian Clearance Interval)"</strong></p>
                    <div class="bg-gray-100 p-4 my-2 rounded-md text-center text-lg font-mono tracking-wide">เวลารวม = WI + PCI</div>
                    <h3 class="text-lg font-semibold pt-2 text-gray-800">1. ช่วงเวลาเดิน (Walk Interval: WI)</h3>
                    <p>คือช่วงที่สัญญาณไฟเขียวรูปคนเดินปรากฏขึ้น เพื่อให้ผู้ข้ามเริ่มเดิน โดยทั่วไปตามมาตรฐานสากลจะกำหนดไว้ระหว่าง <strong>4 ถึง 7 วินาที</strong></p>
                    <h3 class="text-lg font-semibold pt-2 text-gray-800">2. ช่วงเวลาว่างของผู้ข้าม (PCI)</h3>
                    <p>คือช่วงที่สัญญาณไฟรูปคนเดินกะพริบ เพื่อให้คนที่เดินเป็นคนสุดท้ายข้ามไปถึงอีกฝั่งได้ทัน คำนวณจากสูตร:</p>
                    <div class="bg-gray-100 p-4 my-2 rounded-md text-center text-lg font-mono tracking-wide">PCI = ความกว้างถนน / ความเร็วในการเดิน</div>
                    <ul class="list-disc list-inside space-y-2 pl-4">
                        <li><strong>ความกว้างถนน:</strong> ระยะทางทั้งหมดที่ต้องข้าม (เมตร หรือ ฟุต)</li>
                        <li><strong>ความเร็วในการเดิน:</strong> ใช้ค่าความเร็วของคนที่เดินช้าที่สุดเป็นเกณฑ์เพื่อให้ปลอดภัยสำหรับทุกคน ผลลัพธ์ที่ได้จะถูก **ปัดเศษขึ้น** เสมอ</li>
                    </ul>
                    <h3 class="text-lg font-semibold pt-2 text-gray-800">ตัวอย่างการคำนวณ</h3>
                    <p>ถนนกว้าง 14 เมตร, ใช้ความเร็วออกแบบ 0.9 m/s, และ WI = 7 วินาที</p>
                    <ol class="list-decimal list-inside space-y-2 pl-4 mt-2">
                        <li><strong>คำนวณหา PCI:</strong> <span class="bg-gray-100 px-2 py-1 rounded font-mono">14 ม. / 0.9 m/s = 15.55 วิ. → ปัดขึ้นเป็น 16 วิ.</span></li>
                        <li><strong>คำนวณหาระยะเวลารวม:</strong> <span class="bg-gray-100 px-2 py-1 rounded font-mono">7 วิ. (WI) + 16 วิ. (PCI) = 23 วิ.</span></li>
                    </ol>
                `
            },
            en: {
                mainTitle: "Pedestrian Crossing Time Calculator",
                visualTitle: "Road Visual (Left-hand traffic)",
                section1Title: "1. Input Data",
                unitLabel: "Unit:",
                unitMeters: "Meters",
                unitFeet: "Feet",
                roadInfoTitle: "Road Information",
                stage1Title: "Stage 1 (First crossing)",
                stage2Title: "Stage 2 (Second crossing)",
                byLanes: "By Lanes",
                byWidth: "By Total Width",
                numLanes: "Number of Lanes",
                laneWidth: "Lane Width",
                visualLanes: "Lanes (for visual)",
                totalWidth: "Total Width",
                enterWidth: "Enter total width",
                hasMedian: "Safe Median Available",
                pedTypeTitle: "Pedestrian Type",
                pedInclusive: "Inclusive (Elderly/Children)",
                pedGeneral: "General",
                pedSpecial: "Special Needs (e.g., wheelchairs)",
                customType: "Custom Speed",
                enterSpeed: "Enter speed",
                walkIntervalTitle: "Walk Interval (Start time)",
                resetBtn: "Reset All",
                section2Title: "2. Calculation Results",
                section3Title: "3. Recommendations & Considerations",
                theoryTitle: "Principles & Calculation Methods",
                // Dynamic Result Texts
                errorPedType: "Please select a pedestrian type.",
                errorSpeed: "Please enter a valid custom speed.",
                errorWidth: "Please fill in all required road width data.",
                speedUsedLabel: "Walking speed used",
                customPedName: "Custom",
                stage1Result: "Stage 1 (Cross {width} {unit}):",
                stage2Result: "Stage 2 (Cross {width} {unit}):",
                totalTimeLabel: "Total time:",
                seconds: "seconds",
                medianSummary: "Crossing with a median requires 2 stages. The longest stage requires {time} seconds for pedestrian type '{type}'.",
                totalRequiredLabel: "Total Crossing Time Required",
                normalSummary: "This {time}-second duration is sufficient for pedestrian type '{type}' to safely cross a {width} {unit} wide road.",
                // Recommendation List
                rec1: "These results are preliminary recommendations. Always consult international standards and local traffic regulations.",
                rec2: "If a safe median (refuge island) is available (at least 1.8m or 6ft wide), consider calculating crossing times in two separate stages.",
                rec3: "Field observations of actual walking speeds should be conducted to verify the appropriateness of the design speed used.",
                rec4: "Inclusive Design is key. Consider using a lower walking speed (e.g., 0.9 m/s or 3.0 ft/s) to accommodate all user groups.",
                rec5: "Physical design elements like curb ramps and tactile paving are crucial for a fully accessible pedestrian crossing.",
                rec6: "<strong>International Standards Guidelines:</strong><ul class='list-circle list-inside ml-4 mt-1'><li><strong>MUTCD (USA):</strong> Uses 1.2 m/s (4.0 ft/s) as standard.</li><li><strong>FHWA (USA):</strong> Recommends 1.0 m/s (3.5 ft/s) where elderly pedestrians are present.</li><li><strong>UK DfT (UK):</strong> Uses 1.0 m/s, or 0.8 m/s in town centers.</li><li><strong>Austroads (Australia):</strong> Uses 1.0 m/s generally, 0.8 m/s in heavily populated areas.</li></ul>",
                // Theory HTML
                theoryHTML: `
                    <p>This document explains the principles and formulas used in the program, providing a basic understanding of traffic engineering related to pedestrian signal design.</p>
                    <h3 class="text-lg font-semibold pt-2 text-gray-800">Calculation Overview</h3>
                    <p>The total time required for a pedestrian to cross (Total Crossing Time) consists of 2 main parts: <strong>"Walk Interval (WI)"</strong> and <strong>"Pedestrian Clearance Interval (PCI)"</strong>.</p>
                    <div class="bg-gray-100 p-4 my-2 rounded-md text-center text-lg font-mono tracking-wide">Total Time = WI + PCI</div>
                    <h3 class="text-lg font-semibold pt-2 text-gray-800">1. Walk Interval (WI)</h3>
                    <p>The period when the steady walking person signal is displayed, prompting pedestrians to start crossing. International standards typically suggest <strong>4 to 7 seconds</strong>.</p>
                    <h3 class="text-lg font-semibold pt-2 text-gray-800">2. Pedestrian Clearance Interval (PCI)</h3>
                    <p>The period when the flashing hand/person signal is shown. It provides enough time for a pedestrian who stepped off the curb at the very end of the Walk Interval to reach the other side. Formula:</p>
                    <div class="bg-gray-100 p-4 my-2 rounded-md text-center text-lg font-mono tracking-wide">PCI = Road Width / Walking Speed</div>
                    <ul class="list-disc list-inside space-y-2 pl-4">
                        <li><strong>Road Width:</strong> The total crossing distance (Meters or Feet).</li>
                        <li><strong>Walking Speed:</strong> Use the speed of slower pedestrians to ensure safety for everyone. The calculated PCI result is <strong>always rounded up</strong> to the next whole second.</li>
                    </ul>
                    <h3 class="text-lg font-semibold pt-2 text-gray-800">Calculation Example</h3>
                    <p>Road width: 14 meters, Design speed: 0.9 m/s, and WI = 7 seconds.</p>
                    <ol class="list-decimal list-inside space-y-2 pl-4 mt-2">
                        <li><strong>Calculate PCI:</strong> <span class="bg-gray-100 px-2 py-1 rounded font-mono">14 m / 0.9 m/s = 15.55 s → Round up to 16 s.</span></li>
                        <li><strong>Calculate Total Time:</strong> <span class="bg-gray-100 px-2 py-1 rounded font-mono">7 s (WI) + 16 s (PCI) = 23 seconds.</span></li>
                    </ol>
                `
            }
        };

        // --- DOM Elements ---
        const form = document.getElementById('crossing-form');
        const medianToggle = document.getElementById('median-toggle');
        const resultContainer = document.getElementById('result-container');
        const roadVisual = document.getElementById('road-visual');
        const resetBtn = document.getElementById('reset-btn');
        const customSpeedDiv = document.getElementById('custom-speed-div');
        const customSpeedInput = document.getElementById('custom-speed');
        const pedTypeRadios = document.querySelectorAll('input[name="ped-type"]');
        const unitBtnMeters = document.getElementById('unit-btn-meters');
        const unitBtnFeet = document.getElementById('unit-btn-feet');
        
        // Language Buttons
        const langBtnTh = document.getElementById('lang-btn-th');
        const langBtnEn = document.getElementById('lang-btn-en');

        // --- State ---
        let currentUnit = 'meters';
        let currentLang = 'th';

        // --- Constants ---
        const walkingSpeeds = {
            meters: { general: 1.2, inclusive: 0.9, special: 0.6 },
            feet: { general: 4.0, inclusive: 3.0, special: 2.0 }
        };
        const METER_TO_FEET = 3.28084;
        
        // Expose setLanguage to global scope for inline onclick handlers
        window.setLanguage = function(lang) {
            if (currentLang === lang) return;
            currentLang = lang;
            
            // Update UI toggles
            if (lang === 'th') {
                langBtnTh.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
                langBtnTh.classList.remove('bg-white', 'text-gray-700', 'border-gray-200', 'hover:bg-gray-50');
                langBtnEn.classList.add('bg-white', 'text-gray-700', 'border-gray-200', 'hover:bg-gray-50');
                langBtnEn.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
                document.documentElement.lang = 'th';
            } else {
                langBtnEn.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
                langBtnEn.classList.remove('bg-white', 'text-gray-700', 'border-gray-200', 'hover:bg-gray-50');
                langBtnTh.classList.add('bg-white', 'text-gray-700', 'border-gray-200', 'hover:bg-gray-50');
                langBtnTh.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
                document.documentElement.lang = 'en';
            }

            applyTranslations();
            updatePedLabels();
            calculateAndDisplay(); 
        };

        function applyTranslations() {
            const t = translations[currentLang];
            
            // Update simple static text via data-i18n
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) {
                    el.innerHTML = t[key];
                }
            });

            // Update placeholders
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (t[key]) {
                    el.setAttribute('placeholder', t[key]);
                }
            });

            // Update static lists/html blocks
            document.getElementById('theory-content').innerHTML = t.theoryHTML;
            
            const recList = document.getElementById('recommendations-list');
            recList.innerHTML = `
                <li>${t.rec1}</li>
                <li>${t.rec2}</li>
                <li>${t.rec3}</li>
                <li>${t.rec4}</li>
                <li>${t.rec5}</li>
                <li>${t.rec6}</li>
            `;
        }

        // --- Initial Setup ---
        setupInputToggle('stage1');
        setupInputToggle('stage2');
        updateUnitButtons();
        applyTranslations(); // Apply initial TH language
        updatePedLabels();
        updateVisualAid();
        calculateAndDisplay();

        // --- Event Listeners ---
        form.addEventListener('input', () => {
             calculateAndDisplay();
             updateVisualAid();
        });

        resetBtn.addEventListener('click', function(e) {
            e.preventDefault();
            form.reset();
            currentUnit = 'meters'; // Reset state
            
            document.querySelectorAll('input[name="stage1-input-type"]')[0].checked = true;
            document.querySelectorAll('input[name="stage2-input-type"]')[0].checked = true;
            setupInputToggle('stage1'); 
            setupInputToggle('stage2');
            customSpeedDiv.classList.remove('open');
            
            updateUnitButtons();
            applyTranslations(); // Restore proper unit labels in current lang
            updatePedLabels();
            updateVisualAid(); 
            calculateAndDisplay();
        });

        unitBtnMeters.addEventListener('click', () => handleUnitChange('meters'));
        unitBtnFeet.addEventListener('click', () => handleUnitChange('feet'));

        // --- Functions ---
        function setupInputToggle(prefix) {
            const radios = document.querySelectorAll(`input[name="${prefix}-input-type"]`);
            const lanesWrapper = document.getElementById(`${prefix}-lanes-wrapper`);
            const directWrapper = document.getElementById(`${prefix}-direct-wrapper`);

            radios.forEach(radio => {
                radio.addEventListener('change', () => {
                    if (radio.value === 'direct') {
                        directWrapper.classList.add('open');
                        lanesWrapper.classList.remove('open');
                    } else {
                        directWrapper.classList.remove('open');
                        lanesWrapper.classList.add('open');
                    }
                });
            });
            const checkedRadio = document.querySelector(`input[name="${prefix}-input-type"]:checked`);
            if(checkedRadio) checkedRadio.dispatchEvent(new Event('change'));
        }

        function updateUnitButtons() {
            if (currentUnit === 'meters') {
                unitBtnMeters.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
                unitBtnMeters.classList.remove('bg-white', 'text-gray-700', 'border-gray-200');
                unitBtnFeet.classList.add('bg-white', 'text-gray-700', 'border-gray-200');
                unitBtnFeet.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
            } else {
                unitBtnFeet.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
                unitBtnFeet.classList.remove('bg-white', 'text-gray-700', 'border-gray-200');
                unitBtnMeters.classList.add('bg-white', 'text-gray-700', 'border-gray-200');
                unitBtnMeters.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
            }
        }
        
        function updatePedLabels() {
            const t = translations[currentLang];
            const speedUnit = currentUnit === 'meters' ? 'm/s' : 'ft/s';
            const unitTextKey = currentUnit === 'meters' ? 'unitMeters' : 'unitFeet';
            
            document.querySelectorAll('.unit-label').forEach(label => {
                label.textContent = t[unitTextKey];
            });
            
            document.getElementById('ped-inclusive-label').textContent = `${t.pedInclusive} (${walkingSpeeds[currentUnit].inclusive.toFixed(1)} ${speedUnit})`;
            document.getElementById('ped-general-label').textContent = `${t.pedGeneral} (${walkingSpeeds[currentUnit].general.toFixed(1)} ${speedUnit})`;
            document.getElementById('ped-special-label').textContent = `${t.pedSpecial} (${walkingSpeeds[currentUnit].special.toFixed(1)} ${speedUnit})`;
            document.getElementById('custom-speed-unit').textContent = speedUnit;
        }

        function getWidthAndLanes(prefix) {
            const inputTypeRadio = document.querySelector(`input[name="${prefix}-input-type"]:checked`);
            if (!inputTypeRadio) return { width: 0, lanes: 0 };
            const inputType = inputTypeRadio.value;
            
            if (inputType === 'direct') {
                const widthInput = document.getElementById(`${prefix}-width`);
                const visLanesInput = document.getElementById(`${prefix}-vis-lanes`);
                const width = widthInput ? parseFloat(widthInput.value) || 0 : 0;
                const lanes = visLanesInput ? parseInt(visLanesInput.value) || 1 : 1;
                return { width, lanes };
            } else {
                const numLanesInput = document.getElementById(`${prefix}-num-lanes`);
                const laneWidthInput = document.getElementById(`${prefix}-lane-width`);
                const lanes = numLanesInput ? parseInt(numLanesInput.value) || 0 : 0;
                const laneWidth = laneWidthInput ? parseFloat(laneWidthInput.value) || 0 : 0;
                return { width: lanes * laneWidth, lanes };
            }
        }
        
        function calculateAndDisplay() {
            const t = translations[currentLang];
            const isMedian = medianToggle.checked;
            const walkInterval = parseFloat(document.getElementById('walk-interval').value) || 7;
            const pedTypeRadio = document.querySelector('input[name="ped-type"]:checked');
            
            if (!pedTypeRadio) {
                resultContainer.innerHTML = `<p class="text-yellow-700">${t.errorPedType}</p>`;
                return;
            }

            const pedType = pedTypeRadio.value;
            let speed;
            let pedTypeText;

            if (pedType === 'custom') {
                speed = parseFloat(customSpeedInput.value) || 0;
                if (speed <= 0) {
                    resultContainer.innerHTML = `<p class="text-yellow-700">${t.errorSpeed}</p>`;
                    return;
                }
                pedTypeText = t.customPedName;
            } else {
                speed = walkingSpeeds[currentUnit][pedType];
                
                // Map the radio value back to the translated title
                if(pedType === 'inclusive') pedTypeText = t.pedInclusive;
                else if(pedType === 'general') pedTypeText = t.pedGeneral;
                else if(pedType === 'special') pedTypeText = t.pedSpecial;
            }
            
            const unitText = currentUnit === 'meters' ? t.unitMeters : t.unitFeet;
            const speedUnitText = currentUnit === 'meters' ? 'm/s' : 'ft/s';
            
            let htmlResult = `<p class="text-gray-600">${t.speedUsedLabel}: <strong class="text-blue-700 text-lg">${speed.toFixed(1)} ${speedUnitText}</strong></p>`;

            const stage1 = getWidthAndLanes('stage1');
            const stage2 = getWidthAndLanes('stage2');

            if (isMedian) {
                if (stage1.width <= 0 || stage2.width <= 0) {
                    resultContainer.innerHTML = `<p class="text-yellow-700">${t.errorWidth}</p>`;
                    return;
                }
                const pci1 = Math.ceil(stage1.width / speed);
                const total1 = walkInterval + pci1;
                const pci2 = Math.ceil(stage2.width / speed);
                const total2 = walkInterval + pci2;
                
                const s1Text = t.stage1Result.replace('{width}', stage1.width.toFixed(1)).replace('{unit}', unitText);
                const s2Text = t.stage2Result.replace('{width}', stage2.width.toFixed(1)).replace('{unit}', unitText);
                const summaryMed = t.medianSummary.replace('{time}', Math.max(total1, total2)).replace('{type}', pedTypeText);

                htmlResult += `
                    <div class="text-left space-y-3 mt-4">
                         <div><h4 class="font-bold text-gray-700">${s1Text}</h4><p class="ml-4">${t.totalTimeLabel} <strong class="text-blue-700">${total1} ${t.seconds}</strong></p></div>
                         <div><h4 class="font-bold text-gray-700">${s2Text}</h4><p class="ml-4">${t.totalTimeLabel} <strong class="text-blue-700">${total2} ${t.seconds}</strong></p></div>
                    </div>
                    <p class="text-sm text-gray-700 bg-blue-100 p-3 rounded-md mt-4">${summaryMed}</p>`;
            } else {
                const totalWidth = stage1.width + stage2.width;
                if (totalWidth <= 0) {
                     resultContainer.innerHTML = `<p class="text-yellow-700">${t.errorWidth}</p>`;
                     return;
                }
                const pci = Math.ceil(totalWidth / speed);
                const totalTime = walkInterval + pci;
                
                const summaryNorm = t.normalSummary.replace('{time}', totalTime).replace('{type}', pedTypeText).replace('{width}', totalWidth.toFixed(1)).replace('{unit}', unitText);

                htmlResult += `
                    <div class="my-4 py-4 border-t border-b border-blue-200">
                         <p class="text-lg font-semibold text-gray-800">${t.totalRequiredLabel}</p>
                         <p class="text-3xl font-bold text-blue-800">${totalTime} ${t.seconds}</p>
                    </div>
                    <p class="text-sm text-gray-700 bg-blue-100 p-3 rounded-md">${summaryNorm}</p>`;
            }
            
            resultContainer.innerHTML = htmlResult;
        }
        
        function handleUnitChange(newUnit) {
            if (newUnit === currentUnit) return; 

            const factor = newUnit === 'feet' ? METER_TO_FEET : 1 / METER_TO_FEET;

            const inputsToConvert = [
                'stage1-lane-width', 'stage1-width',
                'stage2-lane-width', 'stage2-width',
                'custom-speed'
            ];
            inputsToConvert.forEach(id => {
                const input = document.getElementById(id);
                if (input && input.value) {
                    const currentValue = parseFloat(input.value);
                    if (!isNaN(currentValue)) {
                        input.value = (currentValue * factor).toFixed(2);
                    }
                }
            });
            
            currentUnit = newUnit;
            updateUnitButtons();
            updatePedLabels();
            calculateAndDisplay();
            updateVisualAid();
        }

        function updateVisualAid() {
            roadVisual.innerHTML = '';
            const isMedian = medianToggle.checked;
            const stage1 = getWidthAndLanes('stage1');
            const stage2 = getWidthAndLanes('stage2');

            const stage1Div = createLaneSection(stage1.lanes);
            const stage2Div = createLaneSection(stage2.lanes);

            stage1Div.style.flexGrow = stage1.lanes;
            stage2Div.style.flexGrow = stage2.lanes;

            if (stage1.lanes > 0) roadVisual.appendChild(stage1Div);
            
            if (isMedian) {
                const medianDiv = document.createElement('div');
                medianDiv.className = 'median-island-visual clipped-by-crosswalk';
                roadVisual.appendChild(medianDiv);
            } else if (stage1.lanes > 0 && stage2.lanes > 0) {
                 const divider = document.createElement('div');
                 divider.className = 'center-divider-solid clipped-by-crosswalk';
                 roadVisual.appendChild(divider);
            }

            if (stage2.lanes > 0) roadVisual.appendChild(stage2Div);

            if (stage1.lanes > 0 || stage2.lanes > 0) {
                const crosswalkContainer = document.createElement('div');
                crosswalkContainer.id = 'crosswalk-container';
                roadVisual.appendChild(crosswalkContainer);

                const stripeCount = 7;
                const totalSpace = 100;
                const stripeAndGapHeight = totalSpace / stripeCount;
                const stripeHeight = stripeAndGapHeight * 0.7;
                
                for (let i = 0; i < stripeCount; i++) {
                    const stripe = document.createElement('div');
                    stripe.className = 'crosswalk-stripe';
                    stripe.style.top = `${i * stripeAndGapHeight}%`;
                    stripe.style.height = `${stripeHeight}%`;
                    crosswalkContainer.appendChild(stripe);
                }

                const stopLineLeft = document.createElement('div');
                stopLineLeft.className = 'stop-line-visual';
                stopLineLeft.id = 'stop-line-left';
                roadVisual.appendChild(stopLineLeft);

                const stopLineRight = document.createElement('div');
                stopLineRight.className = 'stop-line-visual';
                stopLineRight.id = 'stop-line-right';
                roadVisual.appendChild(stopLineRight);
            }
        }

        function createLaneSection(numLanes) {
            const section = document.createElement('div');
            section.className = 'traffic-flow clipped-by-crosswalk';
            if (numLanes > 1) {
                for (let i = 0; i < numLanes - 1; i++) {
                    const marking = document.createElement('div');
                    marking.className = 'lane-marking-dashed w-full';
                    section.appendChild(marking);
                }
            }
            if (numLanes < 1) { 
                 return section;
            }
            if (section.childElementCount === 0) {
                 section.innerHTML = '&nbsp;';
            }
            return section;
        }
        
        pedTypeRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                if(e.target.value === 'custom') {
                    customSpeedDiv.classList.add('open');
                } else {
                    customSpeedDiv.classList.remove('open');
                }
            });
        });
    });
    </script>
</body>
</html>
